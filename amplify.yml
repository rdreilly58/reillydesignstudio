version: 1

frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefer-offline --no-audit
        - npx prisma generate
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .next/cache/**/*
      - .npm/**/*
